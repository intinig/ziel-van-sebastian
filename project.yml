name: ZielVanSebastian
options:
  bundleIdPrefix: com.gintini
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
targets:
  ZielVanSebastian:
    type: application
    platform: macOS
    sources:
      - App
      - path: Sources
        excludes:
          - "VoiceGatewaySTT/**"
    settings:
      base:
        PRODUCT_NAME: Ziel van Sebastian
        PRODUCT_BUNDLE_IDENTIFIER: com.gintini.ZielVanSebastian
        INFOPLIST_FILE: App/Info.plist
  MockGateway:
    type: tool
    platform: macOS
    sources:
      - MockGateway
      - Sources/MockGatewayKit
    settings:
      base:
        PRODUCT_NAME: mock-gateway
  CoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
      - Sources/Core
      - Sources/Gateway
      - Sources/MockGatewayKit
      - Sources/Speech
      - Sources/VoiceGatewayKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
  VoiceGateway:
    type: tool
    platform: macOS
    sources:
      - VoiceGateway
      - Sources/Core
      - Sources/VoiceGatewayKit
      - Sources/VoiceGatewaySTT
    settings:
      base:
        PRODUCT_NAME: voice-gateway
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/Vendor/whisper/include
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Vendor/whisper/lib
        OTHER_LDFLAGS: "-lwhisper -lggml -lggml-base -lggml-cpu -lggml-blas -lggml-metal -lc++ -framework Metal -framework MetalKit -framework Accelerate -framework AVFoundation -framework CoreAudio"
  VoiceGatewayTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: TestsVoice
        excludes:
          - "Fixtures/**"
      - path: TestsVoice/Fixtures
        buildPhase: resources
      - Sources/Core
      - Sources/VoiceGatewayKit
      - Sources/VoiceGatewaySTT
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_INCLUDE_PATHS: $(PROJECT_DIR)/Vendor/whisper/include
        LIBRARY_SEARCH_PATHS: $(PROJECT_DIR)/Vendor/whisper/lib
        OTHER_LDFLAGS: "-lwhisper -lggml -lggml-base -lggml-cpu -lggml-blas -lggml-metal -lc++ -framework Metal -framework MetalKit -framework Accelerate -framework AVFoundation -framework CoreAudio"
schemes:
  ZielVanSebastian:
    build:
      targets:
        ZielVanSebastian: all
        MockGateway: all
    test:
      targets:
        - CoreTests
  VoiceGatewayTests:
    build:
      targets:
        VoiceGateway: all
        VoiceGatewayTests: all
    test:
      targets:
        - VoiceGatewayTests
